<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mesa de Servicio de GNL Quintero</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Segoe UI, sans-serif;
      background: #f3f2f1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 600px;
      max-width: 90%;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      text-align: center;
      overflow: hidden;
    }

    .header {
      height: 120px;
      background: linear-gradient(90deg, #3b2970, #1f8a3b);
    }

    .content {
      padding: 30px;
    }

    h2 {
      margin: 0 0 15px 0;
      font-size: 24px;
    }

    p {
      color: #666;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      background: #0078D7;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea6;
    }

  </style>

  <script>
    function abrirPortal() {
      window.open(
        "https://gnlquintero.atlassian.net/servicedesk/customer/portal/34",
        "_blank"
      );
    }
  </script>

</head>

<body>

<div class="card">
  <div class="header"></div>

  <div class="content">
    <h2>Mesa de Servicio de GNL Quintero</h2>
    <p>Accede al sitio para ingresar tus solicitudes de Soporte IT</p>

    <!-- BOTÓN SE MANTIENE IGUAL -->
    <button onclick="abrirPortal()">
      Abrir Portal
    </button>

  </div>
</div>

</body>
</html>
